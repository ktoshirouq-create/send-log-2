<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Climb Log</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="stylesheet" href="./style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div id="view-log" class="container">
        <h2 style="margin-bottom: 20px; font-size: 1.8rem; letter-spacing: -0.5px;">Log Ascent</h2>
        
        <div class="section" id="datePicker">
            <div class="section-title">Date</div>
            <div class="pill-group">
                <div class="pill active" id="pill-today" onclick="App.setDate('today')">Today</div>
                <div class="pill" id="pill-yest" onclick="App.setDate('yesterday')">Yesterday</div>
                <div class="pill" id="pill-custom" onclick="document.getElementById('dateInput').click()">Custom</div>
                <input type="date" id="dateInput" class="hidden" onchange="App.setDate('custom', this.value)">
            </div>
        </div>

        <div class="section">
            <div class="section-title">Discipline</div>
            <div class="pill-group" id="typeSelector"></div>
        </div>

        <div class="section hidden" id="input-outdoor">
            <div class="section-title" id="outdoor-name-lbl">Route Name</div>
            <div class="input-group">
                <input type="text" id="input-name" placeholder="Name">
                <input type="text" id="input-crag" placeholder="Crag / Sector">
            </div>
        </div>

        <div class="section" id="input-indoor">
            <div class="section-title">Gym</div>
            <div class="pill-group" id="gymPicker"></div>
        </div>

        <div class="section">
            <div class="section-title">Grade</div>
            <div class="pill-group" id="gradePicker"></div>
        </div>

        <div class="section">
            <div class="section-title">Angle & Style</div>
            <div class="pill-group" id="angleSelector" style="margin-bottom: 12px;"></div>
            <div class="pill-group" id="styleSelector"></div>
        </div>

        <button class="btn-submit" onclick="App.logClimb()">Save to Cloud</button>
    </div>

    <div id="view-dash" class="container hidden">
        <h2 style="margin-bottom: 20px; font-size: 1.8rem; letter-spacing: -0.5px;">Dashboard <span class="sync-badge">☁️</span></h2>
        
        <div class="section">
            <div class="pill-group" id="dashSelector"></div>
        </div>

        <div class="section">
            <div class="chart-toggles" id="chartToggle"></div>
            <div id="noDataMsg" style="text-align:center; padding: 40px 0; color: var(--text-muted); font-style: italic; display:none;">No data yet.</div>
            <div class="chart-container">
                <canvas id="progressChart"></canvas>
            </div>
        </div>

        <div class="section">
            <div class="section-title">60-Day Send Pyramid</div>
            <div id="pyramidCont"></div>
        </div>

        <div class="section" style="border: none; background: transparent; padding: 0;">
            <div class="chart-toggles" style="margin-bottom: 8px;">
                <div id="list-toggle-top" class="chart-toggle-btn active" onclick="App.haptic(); State.listMode='top10';">Top 10</div>
                <div id="list-toggle-recent" class="chart-toggle-btn" onclick="App.haptic(); State.listMode='recent';">Recent</div>
            </div>
            <div id="logList" style="background: var(--surface); padding: 16px; border-radius: 16px; border: 1px solid var(--border);"></div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-item active" id="nav-log" onclick="App.haptic(); State.view='log';">
            <div class="nav-icon">✍️</div>
            <span>Log</span>
        </div>
        <div class="nav-item" id="nav-dash" onclick="App.haptic(); State.view='dash';">
            <div class="nav-icon">📊</div>
            <span>Stats</span>
        </div>
    </div>

    <div id="toast" class="toast">Action Successful</div>

    <script src="./app.js"></script>
</body>
</html>
