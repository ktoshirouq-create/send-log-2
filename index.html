<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Send Log</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230a0a0a%22/><text y=%2250%22 x=%2250%22 font-size=%2255%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>⛰️</text></svg>">
    <style>
        :root { --primary: #10b981; --primary-fade: rgba(16,185,129,0.15); --flash: #db2777; --dark: #0a0a0a; --card-bg: #171717; --border: #262626; --text: #f3f4f6; --text-muted: #737373; --danger: #ef4444; --radius: 16px; }
        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; -webkit-tap-highlight-color: transparent; overscroll-behavior-y: none; }
        .container { max-width: 850px; margin: 0 auto; padding: 24px 24px 120px 24px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        
        /* Premium Grouping for Advanced Details */
        .detail-group { background: rgba(255,255,255,0.02); border: 1px solid #333; border-radius: 12px; padding: 16px; margin-bottom: 16px; }
        .detail-group label { margin-top: 0; color: #a3a3a3; font-size: 0.7rem; border-bottom: 1px dashed #333; padding-bottom: 8px; margin-bottom: 12px; }

        h1 { text-align: center; font-weight: 700; font-size: 1.5rem; margin-bottom: 24px; letter-spacing: -0.5px; }
        h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin: 0 0 16px 0; display: flex; justify-content: space-between; align-items: center; }
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Balanced Nav Bar */
        .bottom-nav { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(23, 23, 23, 0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; gap: 8px; padding: 6px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; width: 280px; justify-content: space-between; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .nav-btn { background: transparent; color: var(--text-muted); border: none; padding: 12px 0; border-radius: 30px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: 0.3s; flex: 1; text-align: center; }
        .nav-btn.active { background: var(--primary); color: #000; }

        label { font-weight: 600; font-size: 0.75rem; color: var(--text-muted); display: block; margin: 15px 0 8px 0; text-transform: uppercase; letter-spacing: 0.5px; }
        .sub-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; margin-top: 12px; }
        input, textarea { width: 100%; padding: 14px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 10px; background: var(--dark); color: var(--text); outline: none; transition: 0.2s; font-family: 'Inter', sans-serif; }
        input:focus, textarea:focus { border-color: var(--primary); }
        .btn-main { background: var(--primary); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 700; font-size: 1.05rem; cursor: pointer; margin-top: 25px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        .btn-main:active { transform: scale(0.97); }
        .dash-btn { background: #1e1e1e; border: 1px solid var(--primary); color: var(--primary); margin-top: 0; margin-bottom: 25px; }
        
        .pill-row { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; margin-bottom: 15px; scrollbar-width: none; }
        .pill-row::-webkit-scrollbar { display: none; }
        .pill { flex: 0 0 auto; padding: 12px 18px; background: var(--dark); border: 1px solid var(--border); border-radius: 12px; font-weight: 700; font-size: 0.9rem; color: var(--text-muted); cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .pill.active { background: var(--primary-fade); color: var(--primary); border-color: var(--primary); }
        .advanced-toggle { color: var(--primary); font-size: 0.85rem; font-weight: 700; text-align: center; margin: 25px 0 15px 0; cursor: pointer; text-transform: uppercase; padding: 12px; border: 1px dashed var(--border); border-radius: 10px; }
        .star-rating { display: flex; gap: 8px; font-size: 2.2rem; color: var(--border); margin-bottom: 5px; cursor: pointer;}
        .star-rating span { transition: color 0.2s; }
        .star-rating span.active { color: #eab308; }
        .sync-badge { position: absolute; top: 20px; right: 20px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); opacity: 0; }
        .sync-badge.syncing { opacity: 1; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }
        
        /* Restored V16 List Styling */
        .log-item { display: flex; align-items: center; background: var(--dark); padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; }
        .log-date { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); width: 55px; flex-shrink: 0; }
        .log-info { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding: 0 10px; }
        .log-name { font-weight: 600; font-size: 0.95rem; color: var(--text); line-height: 1.2; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .log-crag { font-size: 0.75rem; color: #a3a3a3; font-weight: 600; margin-top: 2px; }
        .log-disc { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-top: 2px; }
        .log-grade { font-size: 1.1rem; font-weight: 700; text-align: right; }
        .log-grade.rp { color: var(--primary); }
        .log-grade.fl { color: var(--flash); }
        .boulder-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; border: 1px solid rgba(255,255,255,0.2); vertical-align: middle; position: relative; top: -1px; }
        .log-del { background: transparent; border: none; color: var(--danger); font-size: 1.5rem; line-height: 1; opacity: 0.3; cursor: pointer; transition: 0.2s; margin-left: 10px; padding: 0 5px; }

        /* Restored XP Bar */
        .xp-wrapper { margin-top: 20px; padding-top: 15px; border-top: 1px dashed rgba(255,255,255,0.1); }
        .xp-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
        .xp-title { font-size: 0.85rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
        .xp-pct { font-size: 1.15rem; font-weight: 800; letter-spacing: -0.5px; }
        .xp-bar-cont { display: flex; align-items: center; gap: 12px; }
        .xp-grade { font-size: 1.15rem; font-weight: 800; width: 42px; text-align: center; }
        .xp-track { flex: 1; height: 12px; background: rgba(0,0,0,0.5); border-radius: 12px; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.05); overflow: hidden; }
        .xp-fill { height: 100%; border-radius: 12px; transition: width 1s ease; }
        
        /* Restored Chart Toggles */
        .chart-toggle-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 6px; border-radius: 12px; border: 1px solid var(--border); width: fit-content; margin: 0 auto; }
        .chart-toggle-btn { padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .chart-toggle-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.4); border: 1px solid rgba(16,185,129,0.2); }
        
        .chart-container { position: relative; height: 300px; width: 100%; max-height: 300px; overflow: hidden;}
        .hidden { display: none !important; }
        .flex { display: flex; gap: 10px; } .flex > div { flex: 1; }
    </style>
</head>
<body>
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-log" onclick="State.view='log'">✍️ Log</button>
        <button class="nav-btn" id="nav-dash" onclick="State.view='dash'">📊 Dashboard</button>
    </nav>
    <div class="container">
        
        <div id="view-log" class="view active">
            <h1>Send Log</h1>
            <div class="card">
                <div class="sync-badge"></div>
                <div class="pill-row" id="typeSelector"></div>
                <div id="climbForm">
                    <label>Date</label>
                    <div class="pill-row" id="datePicker">
                        <div class="pill active" id="pill-today" onclick="App.setDate('today')">Today</div>
                        <div class="pill" id="pill-yest" onclick="App.setDate('yesterday')">Yesterday</div>
                        <div class="pill" id="pill-custom" onclick="document.getElementById('native-date').showPicker()">Custom Date</div>
                    </div>
                    <input type="date" id="native-date" class="hidden" onchange="App.setDate('custom', this.value)">
                    
                    <div id="input-indoor">
                        <label>Select Gym</label>
                        <div id="gymPicker" class="pill-row"></div>
                    </div>
                    
                    <div id="input-outdoor" class="hidden">
                        <div class="flex">
                            <div><label id="outdoor-name-lbl">Route Name</label><input type="text" id="input-name" placeholder="Silence"></div>
                            <div><label>Crag</label><input type="text" id="input-crag" placeholder="Flatanger"></div>
                        </div>
                    </div>
                    
                    <label>Grade</label>
                    <div id="gradePicker" class="pill-row"></div>
                    
                    <label>Style of Ascent</label>
                    <div class="pill-row" id="styleSelector"></div>
                    
                    <div class="advanced-toggle" id="adv-toggle" onclick="App.toggleAdvanced()">+ Add Details</div>
                    
                    <div id="advanced-content" class="hidden">
                        
                        <div class="detail-group">
                            <label>Context (Override)</label>
                            <div class="pill-row" id="timeBucketSelector" style="margin-bottom:0;">
                                <div class="pill" id="time-morn" onclick="App.setTimeofday('Morning')">Morning</div>
                                <div class="pill" id="time-aft" onclick="App.setTimeofday('Afternoon')">Afternoon</div>
                                <div class="pill" id="time-eve" onclick="App.setTimeofday('Evening')">Evening</div>
                            </div>
                        </div>

                        <div class="detail-group">
                            <label>Experience</label>
                            <div class="sub-label" style="margin-top:0;">My Effort</div>
                            <div class="pill-row" id="rpeSelector"></div>
                            <div class="sub-label">The Grade</div>
                            <div class="pill-row" id="gradeFeelSelector">
                                <div class="pill" id="feel-soft" onclick="App.toggleGradeFeel('Soft')">Soft</div>
                                <div class="pill" id="feel-hard" onclick="App.toggleGradeFeel('Hard')">Hard</div>
                            </div>
                            <div class="sub-label">Route Rating</div>
                            <div class="star-rating" id="starRating">
                                <span onclick="App.setRating(1)">★</span><span onclick="App.setRating(2)">★</span><span onclick="App.setRating(3)">★</span><span onclick="App.setRating(4)">★</span><span onclick="App.setRating(5)">★</span>
                            </div>
                        </div>

                        <div class="detail-group">
                            <label>Route Profile</label>
                            <div class="sub-label" style="margin-top:0;">Steepness</div>
                            <div class="pill-row" id="steepnessSelector"></div>
                            <div class="sub-label">Style</div>
                            <div class="pill-row" id="climbStyleSelector"></div>
                            <div class="sub-label">Holds</div>
                            <div class="pill-row" id="holdsSelector" style="margin-bottom:0;"></div>
                        </div>

                        <div class="detail-group">
                            <label>Notes</label>
                            <textarea id="input-notes" placeholder="Beta, headspace, flow..."></textarea>
                        </div>

                    </div>
                    <button class="btn-main" onclick="App.logClimb()">Save to Cloud</button>
                </div>
            </div>
        </div>
        
        <div id="view-dash" class="view">
            <h1>Dashboard</h1>
            <div class="card" style="padding-bottom: 20px;">
                <button class="btn-main dash-btn" onclick="window.location.href='dashboard.html'">🧠 Open Nerd Dashboard</button>
                <div class="sync-badge"></div>
                <div class="pill-row" id="dashSelector" style="margin-bottom: 25px;"></div>
                
                <div class="chart-toggle-row" id="chartToggle">
                    <div class="chart-toggle-btn active" id="chart-max" onclick="State.chartMode='max'">Max Peak</div>
                    <div class="chart-toggle-btn" id="chart-avg" onclick="State.chartMode='avg'">Avg (Top 10)</div>
                </div>
                
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            
            <div class="card">
                <h2>Logs 
                    <div class="chart-toggle-row" style="margin: 0;">
                        <div class="chart-toggle-btn active" id="list-toggle-top" onclick="State.listMode='top10';">Top 10</div>
                        <div class="chart-toggle-btn" id="list-toggle-recent" onclick="State.listMode='recent';">Recent</div>
                    </div>
                </h2>
                <div id="logList"></div>
            </div>
        </div>
    </div>
    
    <script src="app.js?v=20"></script>
</body>
</html>
