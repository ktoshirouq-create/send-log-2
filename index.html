<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Send Log</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230a0a0a%22/><text y=%2250%22 x=%2250%22 font-size=%2255%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>⛰️</text></svg>">
    <style>
        :root { 
            --primary: #10b981; --primary-fade: rgba(16,185,129,0.15); 
            --flash: #db2777; --dark: #0a0a0a; --card-bg: #171717; --border: #262626; 
            --text: #f3f4f6; --text-muted: #737373; --danger: #ef4444; --radius: 16px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 850px; margin: 0 auto; padding: 24px 24px 120px 24px; }
        .card { background: var(--card-bg); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        h1 { text-align: center; font-weight: 700; font-size: 1.5rem; margin-bottom: 24px; }
        h2 { font-size: 1.1rem; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin: 0 0 16px 0; display: flex; justify-content: space-between; align-items: center; }
        
        .view { display: none; animation: fadeIn 0.3s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .bottom-nav { position: fixed; bottom: 20px; width: 90%; max-width: 400px; left: 50%; transform: translateX(-50%); background: rgba(23, 23, 23, 0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); display: flex; gap: 10px; padding: 8px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .nav-btn { flex: 1; background: transparent; color: var(--text-muted); border: none; padding: 12px; border-radius: 20px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: #000; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }

        label { font-weight: 600; font-size: 0.75rem; color: var(--text-muted); display: block; margin: 15px 0 8px 0; text-transform: uppercase; }
        .sub-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 8px; margin-top: 12px; }
        input[type="text"], input[type="date"], textarea { width: 100%; padding: 14px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 10px; font-size: 1rem; background: var(--dark); color: var(--text); outline: none; transition: 0.2s; font-family: 'Inter', sans-serif; }
        input:focus, textarea:focus { border-color: var(--primary); }
        textarea { resize: vertical; min-height: 80px; }
        
        .btn-main { background: var(--primary); color: #000; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: 700; font-size: 1.05rem; cursor: pointer; margin-top: 25px; transition: all 0.3s; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main:active { transform: scale(0.97); }
        .btn-main:disabled { cursor: not-allowed; opacity: 0.7; }
        .dash-btn { background: #1e1e1e; border: 1px solid var(--primary); color: var(--primary); margin-top: 0; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(16,185,129,0.1); }

        .pill-row { display: flex; overflow-x: auto; gap: 10px; padding-bottom: 5px; scroll-snap-type: x mandatory; scrollbar-width: none; margin-bottom: 15px; }
        .pill-row::-webkit-scrollbar { display: none; }
        .pill { flex: 0 0 auto; padding: 12px 20px; background: var(--dark); border: 1px solid var(--border); border-radius: 12px; font-weight: 700; font-size: 0.95rem; color: var(--text-muted); scroll-snap-align: center; cursor: pointer; transition: 0.2s; user-select: none; }
        .pill.active { background: var(--primary-fade); color: var(--primary); border-color: var(--primary); }

        .advanced-toggle { background: #1e1e1e; color: var(--text); font-size: 0.85rem; font-weight: 700; text-align: center; margin: 25px 0 15px 0; cursor: pointer; text-transform: uppercase; padding: 14px; border: 1px solid var(--border); border-radius: 12px; transition: 0.2s; }
        .advanced-toggle:active { transform: scale(0.98); }
        .zone-divider { height: 1px; background: rgba(255,255,255,0.05); margin: 24px 0; border: none; }

        .star-rating { display: flex; gap: 8px; font-size: 2.2rem; color: var(--border); margin-bottom: 15px; }
        .star-rating span.active { color: #eab308; text-shadow: 0 0 10px rgba(234, 179, 8, 0.4); }

        .boulder-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; border: 1px solid rgba(255,255,255,0.2); vertical-align: middle; }
        
        .sync-badge { position: absolute; top: 20px; right: 20px; width: 10px; height: 10px; border-radius: 50%; background: var(--primary); opacity: 0; transition: 0.3s; }
        .sync-badge.syncing { opacity: 1; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 0.5; } 50% { transform: scale(1.5); opacity: 1; } }

        .toast { position: fixed; top: 20px; left: 50%; transform: translate(-50%, -20px); opacity: 0; background: rgba(38,38,38,0.9); backdrop-filter: blur(10px); color: #fff; padding: 12px 24px; border-radius: 30px; font-weight: 600; border: 1px solid var(--border); transition: 0.3s; z-index: 2000; pointer-events: none; }
        .toast.show { transform: translate(-50%, 0); opacity: 1; }

        .log-item { display: flex; align-items: center; background: var(--dark); padding: 12px 16px; border-radius: 10px; border: 1px solid var(--border); margin-bottom: 8px; }
        .log-date { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); width: 55px; }
        .log-info { flex: 1; overflow: hidden; padding: 0 10px; }
        .log-name { font-weight: 600; font-size: 0.95rem; color: var(--text); }
        .log-crag { font-size: 0.75rem; color: #a3a3a3; font-weight: 600; margin-top: 2px; }
        .log-disc { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-top: 2px; }
        .log-grade { font-size: 1.1rem; font-weight: 700; text-align: right; }
        .log-grade.rp { color: var(--primary); }
        .log-grade.fl { color: var(--flash); }
        .log-del { background: transparent; border: none; color: var(--danger); font-size: 1.5rem; opacity: 0.3; cursor: pointer; padding: 0 5px; margin-left: 10px; }

        .chart-toggle-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 20px; background: rgba(255,255,255,0.02); padding: 6px; border-radius: 12px; border: 1px solid var(--border); width: fit-content; margin: 0 auto; }
        .chart-toggle-btn { padding: 6px 14px; border-radius: 8px; font-size: 0.7rem; font-weight: 700; color: var(--text-muted); cursor: pointer; text-transform: uppercase; }
        .chart-toggle-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.4); border: 1px solid rgba(16,185,129,0.2); }
        .chart-container { position: relative; height: 300px; width: 100%; }

        /* NEW LOGS HEADER & TOGGLE UI */
        .log-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .log-header-row h2 { border: none; padding: 0; margin: 0; }
        .log-toggle { display: flex; background: #111; border-radius: 8px; padding: 3px; border: 1px solid #333; }
        .log-toggle-btn { background: transparent; color: #737373; border: 1px solid transparent; padding: 6px 12px; font-size: 0.7rem; font-weight: 700; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .log-toggle-btn.active { color: var(--primary); border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.1); box-shadow: 0 2px 8px rgba(0,0,0,0.5); }

        /* V28 GLOW-UP: WORKING CAPACITY XP BAR */
        .xp-container { margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed #333; }
        .xp-row-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 10px; }
        .xp-title { font-size: 0.75rem; font-weight: 700; color: #737373; text-transform: uppercase; letter-spacing: 1px; }
        .xp-percent { font-size: 1.2rem; font-weight: 700; color: var(--primary); line-height: 1; }
        .xp-row-bottom { display: flex; justify-content: space-between; align-items: center; gap: 15px; }
        .xp-grade { font-size: 1.15rem; font-weight: 700; color: var(--primary); width: 35px; }
        .xp-grade.right { text-align: right; }
        .xp-bar-bg { flex: 1; height: 12px; background: #262626; border-radius: 6px; overflow: hidden; position: relative; }
        .xp-bar-fill { height: 100%; background: var(--primary); width: 0%; border-radius: 6px; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px rgba(16,185,129,0.5); }

        .flex { display: flex; gap: 10px; } .flex > div { flex: 1; } .hidden { display: none !important; }
    </style>
</head>
<body>
    <nav class="bottom-nav">
        <button class="nav-btn active" id="nav-log" onclick="App.haptic(); State.view='log'">✍️ Log</button>
        <button class="nav-btn" id="nav-dash" onclick="App.haptic(); State.view='dash'">📊 Dashboard</button>
    </nav>

    <div id="toast" class="toast">Action Successful</div>

    <div class="container">
        <div id="view-log" class="view active">
            <h1>Send Log</h1>
            <div class="card">
                <div class="sync-badge"></div>
                <div class="pill-row" id="typeSelector"></div>
                <div id="climbForm">
                    <label>Date</label>
                    <div class="pill-row" id="datePicker">
                        <div class="pill active" id="pill-today" onclick="App.setDate('today')">Today</div>
                        <div class="pill" id="pill-yest" onclick="App.setDate('yesterday')">Yesterday</div>
                        <div class="pill" id="pill-custom" onclick="document.getElementById('native-date').showPicker()">Custom Date</div>
                    </div>
                    <input type="date" id="native-date" class="hidden" onchange="App.setDate('custom', this.value)">
                    <div id="input-indoor">
                        <label>Select Gym</label>
                        <div id="gymPicker" class="pill-row"></div>
                    </div>
                    <div id="input-outdoor" class="hidden">
                        <div class="flex">
                            <div><label>Route Name</label><input type="text" id="input-name" placeholder="Silence"></div>
                            <div><label>Crag</label><input type="text" id="input-crag" placeholder="Flatanger"></div>
                        </div>
                    </div>
                    
                    <label>Grade</label>
                    <div id="gradePicker" class="pill-row"></div>

                    <label>Style of Ascent</label>
                    <div class="pill-row" id="styleSelector"></div>
                    
                    <div class="advanced-toggle" onclick="document.getElementById('advanced-content').classList.toggle('hidden'); this.innerText = this.innerText.includes('+') ? '- Hide Details' : '+ Add Details'; App.haptic();">+ Add Details</div>
                    
                    <div id="advanced-content" class="hidden">
                        
                        <label>Time of Day</label>
                        <div class="pill-row" id="timeBucketSelector">
                            <div class="pill" id="time-morn" onclick="App.setTimeBucket('Morning')">Morning</div>
                            <div class="pill" id="time-aft" onclick="App.setTimeBucket('Afternoon')">Afternoon</div>
                            <div class="pill" id="time-eve" onclick="App.setTimeBucket('Evening')">Evening</div>
                        </div>

                        <hr class="zone-divider">

                        <div class="sub-label">My Effort</div>
                        <div class="pill-row" id="rpeSelector"></div>
                        <div class="sub-label">The Grade</div>
                        <div class="pill-row" id="gradeFeelSelector">
                            <div class="pill" id="feel-soft" onclick="App.toggleGradeFeel('Soft')">Soft</div>
                            <div class="pill" id="feel-hard" onclick="App.toggleGradeFeel('Hard')">Hard</div>
                        </div>
                        
                        <div class="sub-label">Route Rating</div>
                        <div class="star-rating" id="starRating">
                            <span onclick="App.setRating(1)">★</span>
                            <span onclick="App.setRating(2)">★</span>
                            <span onclick="App.setRating(3)">★</span>
                            <span onclick="App.setRating(4)">★</span>
                            <span onclick="App.setRating(5)">★</span>
                        </div>

                        <hr class="zone-divider">

                        <label>Steepness</label>
                        <div class="pill-row" id="steepnessSelector"></div>

                        <label>Climbing Style</label>
                        <div class="pill-row" id="climbStyleSelector"></div>

                        <label>Hold Types</label>
                        <div class="pill-row" id="holdsSelector"></div>

                        <hr class="zone-divider">

                        <label>Notes</label>
                        <textarea id="input-notes" placeholder="beta and headspace..."></textarea>
                    </div>
                    
                    <button class="btn-main" onclick="App.logClimb()">Save to Cloud</button>
                </div>
            </div>
        </div>

        <div id="view-dash" class="view">
            <h1>Dashboard</h1>
            <div class="card">
                <button class="btn-main dash-btn" onclick="window.location.href='dashboard.html'">🧠 Open Nerd Dashboard</button>
                <div class="sync-badge"></div>
                <div class="pill-row" id="dashSelector" style="margin-bottom: 25px;"></div>
                <div class="chart-toggle-row" id="chartToggle"></div>
                <div class="chart-container">
                    <div id="noDataMsg" style="color: var(--text-muted); font-style: italic; text-align: center; padding-top: 40px; display: none;">Log climbs to view progression</div>
                    <canvas id="progressChart"></canvas>
                </div>
            </div>
            <div class="card">
                <div class="log-header-row">
                    <h2 id="logHeader">Last 60 Days</h2>
                    <div class="log-toggle">
                        <button class="log-toggle-btn active" id="listToggleTop" onclick="App.haptic(); State.listMode='top10';">Top 10</button>
                        <button class="log-toggle-btn" id="listToggleRecent" onclick="App.haptic(); State.listMode='recent';">Recent</button>
                    </div>
                </div>

                <div id="xpContainer" class="xp-container hidden">
                    <div class="xp-row-top">
                        <div class="xp-title">Working Capacity</div>
                        <div class="xp-percent" id="xpPercent">0%</div>
                    </div>
                    <div class="xp-row-bottom">
                        <div class="xp-grade" id="xpBaseGrade">-</div>
                        <div class="xp-bar-bg"><div class="xp-bar-fill" id="xpBarFill"></div></div>
                        <div class="xp-grade right" id="xpNextGrade">-</div>
                    </div>
                </div>

                <div id="logList" class="log-list"></div>
            </div>
        </div>
    </div>
    
    <script src="app.js?v=30"></script>
</body>
</html>
