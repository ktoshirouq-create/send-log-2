<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nerd Dashboard</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22%230a0a0a%22/><text y=%2250%22 x=%2250%22 font-size=%2255%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>📊</text></svg>">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 0; margin:0; }
        .container { padding: 20px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 1px solid #333; }
        .back-btn { background: #333; color: #fff; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; }
        .filter-row { display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; position: sticky; top: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid #222; scrollbar-width: none; }
        .filter-row::-webkit-scrollbar { display: none; }
        .filter-pill { padding: 8px 16px; background: #1e1e1e; border: 1px solid #333; border-radius: 20px; cursor: pointer; white-space: nowrap; font-size: 0.9rem; font-weight: bold; color: #888; }
        .filter-pill.active { border-color: #10b981; color: #10b981; background: rgba(16,185,129,0.1); }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px; }
        .stat-card { background: #171717; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #262626; }
        .stat-val { font-size: 22px; font-weight: bold; }
        .stat-lbl { font-size: 10px; color: #737373; text-transform: uppercase; margin-top: 5px; letter-spacing: 0.5px; }
        .dash-card { background: #171717; padding: 20px; border-radius: 12px; border: 1px solid #262626; margin: 0 20px 20px 20px; overflow: hidden; }
        .section-header { font-size: 12px; text-transform: uppercase; color: #737373; margin-bottom: 15px; font-weight: bold; border-bottom: 1px solid #262626; padding-bottom: 8px; letter-spacing: 1px; }
        .habit-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; }
        .habit-val { font-weight: bold; color: #10b981; }
        .chart-wrapper { display: flex; justify-content: center; align-items: center; min-height: 250px; position: relative; }
        canvas { max-width: 100% !important; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0; }
        @media (max-width: 650px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header-bar">
        <h2>📊 Nerd Dashboard</h2>
        <button class="back-btn" onclick="window.location.href='./'">← Back</button>
    </div>

    <div class="filter-row" id="global-filter">
        <div class="filter-pill active" data-filter="All">All Disciplines</div>
        <div class="filter-pill" data-filter="Indoor Rope Climbing">Indoor Rope</div>
        <div class="filter-pill" data-filter="Outdoor Rope Climbing">Outdoor Rope</div>
        <div class="filter-pill" data-filter="Indoor Bouldering">Indoor Boulder</div>
        <div class="filter-pill" data-filter="Outdoor Bouldering">Outdoor Boulder</div>
    </div>

    <div class="stats-grid">
        <div class="stat-card"><div class="stat-val" id="stat-sends">0</div><div class="stat-lbl">Total Sends</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-outdoor">0</div><div class="stat-lbl">Outdoor Days</div></div>
        <div class="stat-card"><div class="stat-val" id="stat-peak">Mix</div><div class="stat-lbl">Peak Grade</div></div>
    </div>

    <div class="dash-card">
        <div class="section-header">Climbing Habits</div>
        <div class="habit-row"><span>Favorite Day</span><span class="habit-val" id="habit-day">-</span></div>
        <div class="habit-row"><span>Prime Window</span><span class="habit-val" id="habit-time">-</span></div>
    </div>

    <div class="grid-2">
        <div class="dash-card">
            <div class="section-header">Energy Systems</div>
            <div class="chart-wrapper"><canvas id="energyChart"></canvas></div>
        </div>
        <div class="dash-card">
            <div class="section-header">Grip Matrix</div>
            <div class="chart-wrapper"><canvas id="gripChart"></canvas></div>
        </div>
    </div>

    <div class="dash-card" style="margin-bottom: 50px;">
        <div class="section-header">CNS Peak Output Tracker</div>
        <div style="height: 250px;"><canvas id="cnsChart"></canvas></div>
    </div>

    <script src="dashboard.js?v=17"></script>
</body>
</html>
