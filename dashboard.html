<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nerd Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        :root { 
            --primary: #10b981; --primary-fade: rgba(16,185,129,0.12); 
            --dark: #050505; --card-bg: #121212; --border: #1a1a1a; 
            --text: #e5e5e5; --text-muted: #737373; --danger: #ef4444; --warning: #eab308; --info: #3b82f6;
            --radius: 16px;
        }

        body { font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); margin: 0; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 850px; margin: 0 auto; padding: 24px 24px 100px 24px; }
        
        .header-row { display: flex; align-items: center; margin-bottom: 24px; gap: 16px; }
        .back-btn { background: #1a1a1a; color: #fff; border: 1px solid rgba(255,255,255,0.1); width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 1.2rem; transition: 0.2s; }
        .back-btn:active { transform: scale(0.95); background: #262626; }
        h1 { font-weight: 800; font-size: 1.6rem; margin: 0; color: #fff; letter-spacing: -0.5px; }
        
        .card { background: var(--card-bg); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.4); }
        h2 { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin: 0 0 20px 0; font-weight: 800; }

        /* ACWR Readiness UI */
        .acwr-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 16px; }
        .acwr-ratio { font-size: 3rem; font-weight: 800; line-height: 1; letter-spacing: -1px; transition: color 0.3s; }
        .acwr-status { font-size: 1rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 6px 12px; border-radius: 8px; background: rgba(255,255,255,0.05); transition: 0.3s; }
        
        .acwr-bar-bg { width: 100%; height: 12px; background: #202020; border-radius: 6px; overflow: hidden; margin-bottom: 24px; display: flex; }
        .acwr-zone { height: 100%; }
        .zone-blue { width: 40%; background: rgba(59, 130, 246, 0.2); }
        .zone-green { width: 25%; background: rgba(16, 185, 129, 0.2); }
        .zone-yellow { width: 10%; background: rgba(234, 179, 8, 0.2); }
        .zone-red { width: 25%; background: rgba(239, 68, 68, 0.2); }
        .acwr-marker { width: 4px; height: 16px; background: #fff; border-radius: 2px; position: relative; top: -14px; margin-bottom: -16px; transition: left 0.5s ease; box-shadow: 0 0 10px rgba(255,255,255,0.8); }

        .acwr-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .acwr-stat-lbl { font-size: 0.65rem; color: #737373; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
        .acwr-stat-val { font-size: 1.1rem; color: #fff; font-weight: 700; }

        /* Top Partners UI */
        .partner-list { display: flex; flex-direction: column; gap: 12px; }
        .partner-row { display: flex; align-items: center; justify-content: space-between; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .partner-left { display: flex; align-items: center; gap: 16px; }
        .partner-rank { font-size: 1.2rem; font-weight: 800; color: #555; width: 24px; text-align: center; }
        .rank-1 { color: #fbbf24; text-shadow: 0 0 10px rgba(251,191,36,0.3); } /* Gold */
        .rank-2 { color: #9ca3af; } /* Silver */
        .rank-3 { color: #b45309; } /* Bronze */
        .partner-name { font-size: 1.05rem; font-weight: 700; color: #fff; }
        .partner-count { font-size: 0.85rem; font-weight: 800; color: var(--primary); background: var(--primary-fade); padding: 4px 10px; border-radius: 20px; }

        /* Volume Chart */
        .chart-container { position: relative; height: 250px; width: 100%; margin-top: 20px; }
        .empty-msg { color: #555; font-style: italic; font-size: 0.9rem; text-align: center; padding: 30px 0; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-row">
            <a href="index.html" class="back-btn">←</a>
            <h1>Nerd Dashboard</h1>
        </div>

        <div class="card">
            <h2>Today's Readiness (ACWR)</h2>
            <div class="acwr-header">
                <div class="acwr-ratio" id="ui-acwr-ratio">0.00</div>
                <div class="acwr-status" id="ui-acwr-status">Calculating</div>
            </div>
            
            <div class="acwr-bar-bg">
                <div class="acwr-zone zone-blue"></div>
                <div class="acwr-zone zone-green"></div>
                <div class="acwr-zone zone-yellow"></div>
                <div class="acwr-zone zone-red"></div>
            </div>
            <div class="acwr-marker" id="ui-acwr-marker" style="left: 0%;"></div>

            <div class="acwr-stats-grid">
                <div>
                    <div class="acwr-stat-lbl">Acute Load (7 Days)</div>
                    <div class="acwr-stat-val" id="ui-acute-load">0 XP</div>
                </div>
                <div>
                    <div class="acwr-stat-lbl">Chronic Load (28 Days avg)</div>
                    <div class="acwr-stat-val" id="ui-chronic-load">0 XP</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>Most Frequent Partners</h2>
            <div id="partner-container" class="partner-list">
                <div class="empty-msg">Not enough partner data yet.</div>
            </div>
        </div>

        <div class="card">
            <h2>30-Day Volume (XP)</h2>
            <div class="chart-container">
                <canvas id="volumeChart"></canvas>
            </div>
        </div>

    </div>

    <script src="dashboard.js"></script>
</body>
</html>
