<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nerd Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=16"> 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0a0a0a; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; padding-bottom: 60px; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #262626; padding-bottom: 15px; margin-bottom: 20px; }
        .back-btn { background: #171717; color: #10b981; border: 1px solid #262626; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .back-btn:active { background: #262626; }
        
        .archetype-container { text-align: center; background: #171717; padding: 30px 20px; border-radius: 16px; margin-bottom: 30px; border: 1px solid #262626; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .archetype-eyebrow { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: #737373; font-weight: 800; margin-bottom: 5px; }
        .archetype-title { font-size: 28px; font-weight: 800; margin: 0 0 10px 0; color: #10b981; }
        .archetype-roast { font-style: italic; color: #a3a3a3; margin-bottom: 0; font-size: 1rem; }
        
        .chart-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .chart-card { background: #171717; padding: 20px; border-radius: 16px; border: 1px solid #262626; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .chart-header { margin: 0 0 15px 0; font-size: 1.05rem; font-weight: 800; color: #f3f4f6; border-bottom: 1px solid #262626; padding-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
        .chart-wrapper { position: relative; flex-grow: 1; min-height: 220px; }
        
        @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header-bar">
        <h2 style="margin: 0; font-size: 1.2rem;">📊 Nerd Dashboard</h2>
        <button class="back-btn" onclick="window.location.href='./'">← Back to Log</button>
    </div>

    <div class="archetype-container" id="archetype-card">
        <div class="archetype-eyebrow">Climber Archetype Profile</div>
        <h3 class="archetype-title" id="arch-title">Analyzing Data...</h3>
        <p class="archetype-roast" id="arch-roast">Log more routes with tags to generate your archetype.</p>
    </div>

    <div class="chart-grid">
        <div class="chart-card">
            <h3 class="chart-header">60-Day Send Pyramid</h3>
            <div class="chart-wrapper"><canvas id="pyramidChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3 class="chart-header">Energy System Distribution</h3>
            <div class="chart-wrapper"><canvas id="energyPieChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3 class="chart-header">Grip Strength Matrix</h3>
            <div class="chart-wrapper"><canvas id="gripRadarChart"></canvas></div>
        </div>
        <div class="chart-card">
            <h3 class="chart-header">CNS Peak Output Tracker</h3>
            <div class="chart-wrapper"><canvas id="cnsLineChart"></canvas></div>
        </div>
    </div>

    <script src="dashboard.js?v=16"></script> 
</body>
</html>
